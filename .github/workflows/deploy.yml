name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if [ ! -d "/home/ubuntu/Fec2" ]; then
              git clone https://github.com/Satish-kl/Fec2.git /home/ubuntu/Fec2
            else
              cd /home/ubuntu/Fec2
              git pull origin main
            fi

            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/Fec2/* /var/www/html/
            sudo systemctl restart nginx
